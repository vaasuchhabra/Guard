<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Herefor.me Beta Signups</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #FDFBF7; --card: #F7F2EA; --dark: #0F1B2D; --accent: #B8924A;
            --text: #0F1B2D; --muted: #5A6577; --green: #16A34A; --red: #DC2626; --blue: #2563eb;
            --font: 'Inter', sans-serif;
        }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; padding: 40px 24px; }
        .container { max-width: 960px; margin: 0 auto; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; }
        .header h1 span { color: var(--accent); }
        .header-actions { display: flex; gap: 10px; }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
        .stat { background: var(--card); border-radius: 20px; padding: 20px 24px; }
        .stat-num { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em; }
        .stat-label { font-size: 0.78rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
        .stat-num.gold { color: var(--accent); }
        .stat-num.green { color: var(--green); }
        .stat-num.blue { color: var(--blue); }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 100px; font-family: var(--font); font-size: 0.85rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-dark { background: var(--dark); color: #fff; }
        .btn-dark:hover { background: #1a2a42; }
        .btn-outline { background: none; border: 2px solid rgba(0,0,0,0.1); color: var(--text); }
        .btn-outline:hover { border-color: var(--text); }
        .btn-sm { padding: 6px 14px; font-size: 0.75rem; }
        .btn-green { background: #DEF7EC; color: var(--green); }
        .btn-red { background: #FEE2E2; color: var(--red); }

        /* Table */
        .table-wrap { background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px 18px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); background: var(--card); border-bottom: 1px solid rgba(0,0,0,0.05); }
        td { padding: 14px 18px; font-size: 0.88rem; border-bottom: 1px solid rgba(0,0,0,0.04); vertical-align: top; }
        tr:hover td { background: rgba(247,242,234,0.5); }

        .name-cell { font-weight: 700; }
        .email-cell { color: var(--blue); }
        .interest-cell { max-width: 200px; font-size: 0.82rem; color: var(--muted); }
        .date-cell { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

        /* Status Badge */
        .status { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
        .status-pending { background: #FEF3C7; color: #B45309; }
        .status-approved { background: #DEF7EC; color: #16A34A; }
        .status-rejected { background: #FEE2E2; color: #DC2626; }

        .actions { display: flex; gap: 6px; }
        .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; }

        /* Back link */
        .back { display: inline-block; margin-bottom: 24px; color: var(--muted); font-size: 0.85rem; font-weight: 600; text-decoration: none; }
        .back:hover { color: var(--text); }

        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .table-wrap { overflow-x: auto; }
            table { min-width: 700px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back">← Back to website</a>

        <div class="header">
            <h1>🛡️ Beta <span>Signups</span></h1>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="loadData()">↻ Refresh</button>
                <a href="/api/export" class="btn btn-dark">↓ Export CSV</a>
            </div>
        </div>

        <div class="stats" id="stats">
            <div class="stat"><div class="stat-num gold" id="totalCount">-</div><div class="stat-label">Total Signups</div></div>
            <div class="stat"><div class="stat-num" id="pendingCount">-</div><div class="stat-label">Pending</div></div>
            <div class="stat"><div class="stat-num green" id="approvedCount">-</div><div class="stat-label">Approved</div></div>
            <div class="stat"><div class="stat-num blue" id="todayCount">-</div><div class="stat-label">Today</div></div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Contact</th>
                        <th>Interest</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" class="empty"><div class="empty-icon">📋</div>Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('/api/submissions');
            const data = await res.json();
            const subs = data.submissions;

            // Stats
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('totalCount').textContent = subs.length;
            document.getElementById('pendingCount').textContent = subs.filter(s => s.status === 'pending').length;
            document.getElementById('approvedCount').textContent = subs.filter(s => s.status === 'approved').length;
            document.getElementById('todayCount').textContent = subs.filter(s => s.submittedAt.startsWith(today)).length;

            const tbody = document.getElementById('tableBody');
            if (subs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty"><div class="empty-icon">📭</div>No signups yet. Share the beta page!</td></tr>';
                return;
            }

            tbody.innerHTML = subs.map(s => `
                <tr>
                    <td class="name-cell">${esc(s.name)}</td>
                    <td>
                        <span class="email-cell">${esc(s.email)}</span><br>
                        <span style="font-size:0.8rem;color:var(--muted)">${esc(s.phone)}</span>
                    </td>
                    <td class="interest-cell">${esc(s.interest)}</td>
                    <td class="date-cell">${formatDate(s.submittedAt)}</td>
                    <td><span class="status status-${s.status}">${s.status}</span></td>
                    <td class="actions">
                        ${s.status !== 'approved' ? `<button class="btn btn-sm btn-green" onclick="updateStatus('${s.id}','approved')">✓</button>` : ''}
                        ${s.status !== 'rejected' ? `<button class="btn btn-sm btn-red" onclick="updateStatus('${s.id}','rejected')">✗</button>` : ''}
                        <button class="btn btn-sm btn-outline" onclick="deleteSub('${s.id}')">🗑</button>
                    </td>
                </tr>
            `).join('');
        }

        async function updateStatus(id, status) {
            await fetch(`/api/submissions/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
            loadData();
        }

        async function deleteSub(id) {
            if (!confirm('Delete this submission?')) return;
            await fetch(`/api/submissions/${id}`, { method: 'DELETE' });
            loadData();
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) + '<br>' +
                   d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
        }

        function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

        loadData();
    </script>
</body>
</html>
